<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧪 史丹利的小烧杯</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;500;700&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #e2e8f0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .header {
      text-align: center;
      padding: 28px 24px;
      background: rgba(15, 23, 42, 0.8);
      border-bottom: 1px solid rgba(99, 102, 241, 0.3);
    }
    .header h1 {
      font-family: 'ZCOOL KuaiLe', 'Bubblegum Sans', cursive;
      font-size: 38px;
      background: linear-gradient(135deg, #f472b6, #818cf8, #38bdf8, #34d399);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(2px 3px 4px rgba(0,0,0,0.4));
      letter-spacing: 2px;
    }
    .header .subtitle {
      font-family: 'Bubblegum Sans', cursive;
      color: #94a3b8; margin-top: 6px; font-size: 15px; letter-spacing: 1px;
    }

    .main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 24px;
    }

    .shelf {
      background: rgba(30, 41, 59, 0.8);
      border-radius: 16px;
      padding: 20px;
      border: 1px solid rgba(99, 102, 241, 0.2);
      max-height: 85vh;
      overflow-y: auto;
    }
    .shelf::-webkit-scrollbar { width: 6px; }
    .shelf::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.3); border-radius: 3px; }
    .shelf h2 { font-size: 16px; color: #a5b4fc; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
    .shelf-category { margin-bottom: 16px; }
    .shelf-category h3 { font-size: 13px; color: #64748b; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
    .chem-btn {
      display: inline-block; padding: 8px 12px; margin: 3px; border-radius: 10px;
      border: 1px solid rgba(148, 163, 184, 0.2); background: rgba(51, 65, 85, 0.6);
      color: #e2e8f0; cursor: pointer; font-size: 13px; font-family: inherit; transition: all 0.2s;
      position: relative;
    }
    .chem-btn:hover { background: rgba(99, 102, 241, 0.3); border-color: #6366f1; transform: translateY(-1px); }
    .chem-btn:active { transform: scale(0.96); }
    .chem-btn .formula { font-weight: 700; }
    .chem-btn .name { font-size: 10px; color: #94a3b8; display: block; margin-top: 2px; }
    .chem-btn .color-dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      margin-right: 4px; vertical-align: middle; border: 1px solid rgba(255,255,255,0.2);
    }

    .lab-bench { display: flex; flex-direction: column; gap: 20px; }

    .beaker-area {
      background: rgba(30, 41, 59, 0.8); border-radius: 16px; padding: 24px;
      border: 1px solid rgba(99, 102, 241, 0.2);
      display: flex; justify-content: center; align-items: flex-end;
      min-height: 380px; position: relative; overflow: hidden;
      transition: border-color 0.5s, box-shadow 0.5s;
    }

    .beaker { width: 200px; height: 260px; position: relative; z-index: 2; }
    .beaker-glass {
      position: absolute; bottom: 0; width: 200px; height: 240px;
      border: 3px solid rgba(148, 163, 184, 0.4); border-top: none;
      border-radius: 0 0 20px 20px; background: rgba(148, 163, 184, 0.05);
      overflow: hidden;
    }
    .beaker-rim { position: absolute; top: 17px; left: -8px; width: 216px; height: 6px; background: rgba(148, 163, 184, 0.3); border-radius: 3px; }
    .beaker-liquid {
      position: absolute; bottom: 0; left: 0; right: 0; height: 0;
      border-radius: 0 0 17px 17px; transition: all 0.8s ease; overflow: hidden;
    }
    .beaker-label { position: absolute; bottom: -32px; width: 100%; text-align: center; font-size: 13px; color: #64748b; }

    /* 固体块 */
    .solid-chunks { position: absolute; bottom: 0; left: 0; right: 0; height: 100%; pointer-events: none; z-index: 1; }
    .solid-chunk {
      position: absolute; bottom: 5px; z-index: 2;
      transition: opacity 1s, transform 1s;
    }
    .solid-chunk.dissolving { opacity: 0; transform: scale(0.2); }
    @keyframes solidDrop {
      0% { transform: translateY(-200px) rotate(0deg); opacity: 0; }
      60% { opacity: 1; }
      80% { transform: translateY(10px) rotate(180deg); }
      100% { transform: translateY(0) rotate(200deg); opacity: 1; }
    }
    .solid-chunk.dropping { animation: solidDrop 0.6s ease-out forwards; }

    .bubble {
      position: absolute; border-radius: 50%; background: rgba(255, 255, 255, 0.3);
      animation: rise 1.5s ease-in infinite;
    }
    @keyframes rise {
      0% { transform: translateY(0) scale(1); opacity: 0.6; }
      100% { transform: translateY(-200px) scale(0.3); opacity: 0; }
    }

    .gas-effect {
      position: absolute; top: -40px; left: 50%; transform: translateX(-50%);
      font-size: 24px; animation: floatUp 2s ease-out infinite; opacity: 0; z-index: 5;
    }
    @keyframes floatUp {
      0% { opacity: 0.8; transform: translateX(-50%) translateY(0); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-60px); }
    }

    .added-items { position: absolute; top: 16px; right: 16px; display: flex; flex-direction: column; gap: 4px; align-items: flex-end; z-index: 3; }
    .added-tag {
      padding: 3px 8px; border-radius: 6px; font-size: 11px;
      background: rgba(99, 102, 241, 0.2); border: 1px solid rgba(99, 102, 241, 0.3);
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
      20%, 40%, 60%, 80% { transform: translateX(4px); }
    }
    .shake { animation: shake 0.6s ease; }

    @keyframes shakeHard {
      0%, 100% { transform: translate(0, 0); }
      10% { transform: translate(-8px, -3px); }
      20% { transform: translate(6px, 4px); }
      30% { transform: translate(-6px, -2px); }
      40% { transform: translate(8px, 3px); }
      50% { transform: translate(-4px, -4px); }
      60% { transform: translate(6px, 2px); }
      70% { transform: translate(-8px, 3px); }
      80% { transform: translate(4px, -2px); }
      90% { transform: translate(-3px, 4px); }
    }
    .shake-hard { animation: shakeHard 0.8s ease; }

    @keyframes shakeExtreme {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      10% { transform: translate(-12px, -5px) rotate(-2deg); }
      20% { transform: translate(10px, 6px) rotate(2deg); }
      30% { transform: translate(-10px, -4px) rotate(-1deg); }
      40% { transform: translate(12px, 5px) rotate(1deg); }
      50% { transform: translate(-8px, -6px) rotate(-2deg); }
      60% { transform: translate(10px, 4px) rotate(2deg); }
      70% { transform: translate(-12px, 5px) rotate(-1deg); }
      80% { transform: translate(8px, -4px) rotate(1deg); }
      90% { transform: translate(-5px, 6px) rotate(-1deg); }
    }
    .shake-extreme { animation: shakeExtreme 1s ease; }

    .flash-overlay {
      position: absolute; inset: 0; border-radius: 16px; pointer-events: none; z-index: 10;
      opacity: 0; transition: opacity 0.1s;
    }
    .flash-overlay.active { opacity: 1; animation: flashPulse 0.6s ease-out forwards; }
    @keyframes flashPulse { 0% { opacity: 0.9; } 100% { opacity: 0; } }

    .particle { position: absolute; border-radius: 50%; pointer-events: none; z-index: 8; }
    .spark {
      position: absolute; width: 3px; height: 3px; border-radius: 50%;
      background: #fbbf24; pointer-events: none; z-index: 8;
      box-shadow: 0 0 6px #fbbf24, 0 0 12px #f97316;
    }
    .smoke {
      position: absolute; border-radius: 50%; pointer-events: none; z-index: 7;
    }
    .precipitate-particle { position: absolute; border-radius: 50%; pointer-events: none; z-index: 6; }
    .ripple {
      position: absolute; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%;
      pointer-events: none; z-index: 6;
    }
    .glow-ring {
      position: absolute; border-radius: 50%; pointer-events: none; z-index: 5;
      border: 2px solid currentColor; opacity: 0;
    }

    /* 沸腾蒸汽 */
    .steam {
      position: absolute; pointer-events: none; z-index: 7; font-size: 16px; opacity: 0;
    }
    @keyframes steamRise {
      0% { opacity: 0.6; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-80px) scale(1.5); }
    }

    .result-panel {
      background: rgba(30, 41, 59, 0.8); border-radius: 16px; padding: 20px;
      border: 1px solid rgba(99, 102, 241, 0.2); min-height: 120px;
      max-height: 400px; overflow-y: auto;
    }
    .result-panel::-webkit-scrollbar { width: 6px; }
    .result-panel::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.3); border-radius: 3px; }
    .result-panel h2 { font-size: 16px; color: #a5b4fc; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
    .result-empty { color: #475569; font-size: 14px; text-align: center; padding: 20px; }
    .reaction-card {
      background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3);
      border-radius: 12px; padding: 14px; margin-bottom: 10px; animation: slideIn 0.5s ease;
    }
    .reaction-card.warning { background: rgba(245, 158, 11, 0.1); border-color: rgba(245, 158, 11, 0.3); }
    .reaction-card.danger { background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.3); }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .reaction-equation { font-size: 16px; font-weight: 700; margin-bottom: 6px; font-family: 'Courier New', monospace; }
    .reaction-desc { font-size: 13px; color: #94a3b8; line-height: 1.6; }
    .reaction-phenomenon { margin-top: 6px; padding: 6px 10px; background: rgba(0,0,0,0.2); border-radius: 8px; font-size: 12px; }
    .reaction-phenomenon span { color: #fbbf24; }

    .controls { display: flex; gap: 12px; justify-content: center; align-items: center; flex-wrap: wrap; }
    .ctrl-btn {
      padding: 10px 24px; border-radius: 10px; border: 1px solid rgba(148, 163, 184, 0.2);
      background: rgba(51, 65, 85, 0.6); color: #e2e8f0; cursor: pointer;
      font-size: 14px; font-family: inherit; transition: all 0.2s;
    }
    .ctrl-btn:hover { background: rgba(239, 68, 68, 0.3); border-color: #ef4444; }
    .ctrl-btn.primary { background: rgba(99, 102, 241, 0.3); border-color: #6366f1; }
    .ctrl-btn.primary:hover { background: rgba(99, 102, 241, 0.5); }
    .sound-toggle { font-size: 20px; cursor: pointer; padding: 8px; border-radius: 8px; background: none; border: 1px solid rgba(148,163,184,0.2); transition: all 0.2s; }
    .sound-toggle:hover { background: rgba(99, 102, 241, 0.2); }

    .thermometer {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      width: 30px; height: 150px; background: rgba(0,0,0,0.3); border-radius: 15px;
      border: 1px solid rgba(148, 163, 184, 0.2); overflow: hidden;
      display: flex; flex-direction: column; justify-content: flex-end;
    }
    .thermo-fill {
      width: 100%; height: 30%; background: linear-gradient(to top, #ef4444, #f97316);
      border-radius: 0 0 15px 15px; transition: height 0.8s ease;
    }
    .thermo-label { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); font-size: 11px; color: #64748b; white-space: nowrap; }

    .flame {
      position: absolute; bottom: -15px; left: 50%; transform: translateX(-50%);
      font-size: 28px; animation: flicker 0.3s ease-in-out infinite alternate; display: none;
    }
    @keyframes flicker { from { transform: translateX(-50%) scale(1); } to { transform: translateX(-50%) scale(1.1); } }

    @media (max-width: 768px) {
      .main { grid-template-columns: 1fr; }
      .header h1 { font-size: 28px; }
      .shelf { max-height: none; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🧪 史丹利的小烧杯</h1>
    <p class="subtitle">Mix chemicals, watch real reactions! ✨</p>
  </div>

  <div class="main">
    <div class="shelf">
      <h2>🧫 化学物质架</h2>
      <div class="shelf-category"><h3>金属</h3><div id="metals"></div></div>
      <div class="shelf-category"><h3>酸</h3><div id="acids"></div></div>
      <div class="shelf-category"><h3>碱</h3><div id="bases"></div></div>
      <div class="shelf-category"><h3>盐 & 氧化物</h3><div id="salts"></div></div>
      <div class="shelf-category"><h3>指示剂 & 其他</h3><div id="others"></div></div>
    </div>

    <div class="lab-bench">
      <div class="beaker-area" id="beakerArea">
        <div class="flash-overlay" id="flashOverlay"></div>
        <div class="thermometer">
          <div class="thermo-fill" id="thermoFill"></div>
          <div class="thermo-label" id="thermoLabel">25°C</div>
        </div>
        <div class="added-items" id="addedItems"></div>
        <div class="beaker">
          <div class="beaker-rim"></div>
          <div class="beaker-glass">
            <div class="beaker-liquid" id="beakerLiquid"></div>
            <div class="solid-chunks" id="solidChunks"></div>
          </div>
          <div class="flame" id="flame">🔥</div>
          <div class="beaker-label">250 mL 烧杯</div>
        </div>
      </div>

      <div class="controls">
        <button class="ctrl-btn" onclick="clearBeaker()">🗑️ 清空烧杯</button>
        <button class="ctrl-btn primary" onclick="toggleHeat()">🔥 加热</button>
        <button class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊</button>
      </div>

      <div class="result-panel">
        <h2>📋 实验记录</h2>
        <div id="results"><div class="result-empty">选择化学物质加入烧杯，开始你的实验吧！</div></div>
      </div>
    </div>
  </div>

<script>
// ==========================================
// 音频引擎
// ==========================================
let audioCtx = null;
let soundEnabled = true;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

const SFX = {
  drop() {
    if (!soundEnabled) return;
    const ctx = getAudioCtx(), osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.type = 'sine'; osc.frequency.setValueAtTime(800, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + 0.15);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    osc.connect(gain).connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.15);
  },
  bubbling(duration = 2) {
    if (!soundEnabled) return;
    const ctx = getAudioCtx(), bufSz = ctx.sampleRate * duration;
    const buf = ctx.createBuffer(1, bufSz, ctx.sampleRate), data = buf.getChannelData(0);
    let phase = 0;
    for (let i = 0; i < bufSz; i++) {
      const t = i / ctx.sampleRate;
      if (Math.random() < 0.003) phase = Math.random() * Math.PI * 2;
      const freq = 200 + Math.sin(phase + t * 15) * 150 + Math.random() * 100;
      data[i] = Math.sin(2 * Math.PI * freq * t) * 0.08 * (1 - t / duration);
      if (Math.random() < 0.01) data[i] += (Math.random() - 0.5) * 0.15;
    }
    const src = ctx.createBufferSource(); src.buffer = buf;
    const gain = ctx.createGain(); gain.gain.setValueAtTime(0.4, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.1, ctx.currentTime + duration);
    const filt = ctx.createBiquadFilter(); filt.type = 'bandpass'; filt.frequency.value = 400; filt.Q.value = 2;
    src.connect(filt).connect(gain).connect(ctx.destination); src.start(); src.stop(ctx.currentTime + duration);
  },
  hiss(duration = 1.5) {
    if (!soundEnabled) return;
    const ctx = getAudioCtx(), bufSz = ctx.sampleRate * duration;
    const buf = ctx.createBuffer(1, bufSz, ctx.sampleRate), data = buf.getChannelData(0);
    for (let i = 0; i < bufSz; i++) data[i] = (Math.random() * 2 - 1) * 0.15 * (1 - i / bufSz);
    const src = ctx.createBufferSource(); src.buffer = buf;
    const filt = ctx.createBiquadFilter(); filt.type = 'highpass'; filt.frequency.value = 3000;
    const gain = ctx.createGain(); gain.gain.setValueAtTime(0.35, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    src.connect(filt).connect(gain).connect(ctx.destination); src.start(); src.stop(ctx.currentTime + duration);
  },
  explosion() {
    if (!soundEnabled) return;
    const ctx = getAudioCtx(), dur = 0.8, bufSz = ctx.sampleRate * dur;
    const buf = ctx.createBuffer(1, bufSz, ctx.sampleRate), data = buf.getChannelData(0);
    for (let i = 0; i < bufSz; i++) {
      const t = i / ctx.sampleRate, env = Math.exp(-t * 8);
      data[i] = (Math.random() * 2 - 1) * env + Math.sin(2 * Math.PI * 60 * t) * env * 0.5;
    }
    const src = ctx.createBufferSource(); src.buffer = buf;
    const gain = ctx.createGain(); gain.gain.setValueAtTime(0.6, ctx.currentTime);
    src.connect(gain).connect(ctx.destination); src.start(); src.stop(ctx.currentTime + dur);
  },
  bigExplosion() {
    if (!soundEnabled) return;
    const ctx = getAudioCtx(), dur = 1.2, bufSz = ctx.sampleRate * dur;
    const buf = ctx.createBuffer(1, bufSz, ctx.sampleRate), data = buf.getChannelData(0);
    for (let i = 0; i < bufSz; i++) {
      const t = i / ctx.sampleRate, env = Math.exp(-t * 5);
      data[i] = (Math.random() * 2 - 1) * env + Math.sin(2 * Math.PI * 40 * t) * env * 0.7 + Math.sin(2 * Math.PI * 80 * t) * env * 0.3;
    }
    const src = ctx.createBufferSource(); src.buffer = buf;
    const gain = ctx.createGain(); gain.gain.setValueAtTime(0.8, ctx.currentTime);
    src.connect(gain).connect(ctx.destination); src.start(); src.stop(ctx.currentTime + dur);
  },
  chime() {
    if (!soundEnabled) return;
    const ctx = getAudioCtx();
    [523, 659, 784].forEach((freq, i) => {
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.type = 'sine'; osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, ctx.currentTime + i * 0.08);
      gain.gain.linearRampToValueAtTime(0.15, ctx.currentTime + i * 0.08 + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.08 + 0.5);
      osc.connect(gain).connect(ctx.destination);
      osc.start(ctx.currentTime + i * 0.08); osc.stop(ctx.currentTime + i * 0.08 + 0.5);
    });
  },
  pour() {
    if (!soundEnabled) return;
    const ctx = getAudioCtx(), dur = 0.4, bufSz = ctx.sampleRate * dur;
    const buf = ctx.createBuffer(1, bufSz, ctx.sampleRate), data = buf.getChannelData(0);
    for (let i = 0; i < bufSz; i++) {
      const t = i / ctx.sampleRate;
      data[i] = (Math.random() * 2 - 1) * 0.1 * Math.sin(Math.PI * t / dur) + Math.sin(2 * Math.PI * (300 + Math.random() * 200) * t) * 0.05;
    }
    const src = ctx.createBufferSource(); src.buffer = buf;
    const filt = ctx.createBiquadFilter(); filt.type = 'bandpass'; filt.frequency.value = 600; filt.Q.value = 1;
    src.connect(filt).connect(ctx.destination); src.start(); src.stop(ctx.currentTime + dur);
  },
  metalClink() {
    if (!soundEnabled) return;
    const ctx = getAudioCtx(), osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.type = 'triangle'; osc.frequency.setValueAtTime(2000, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.25, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
    osc.connect(gain).connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.2);
  },
  alarm() {
    if (!soundEnabled) return;
    const ctx = getAudioCtx(), osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.type = 'square'; osc.frequency.setValueAtTime(800, ctx.currentTime);
    gain.gain.setValueAtTime(0.1, ctx.currentTime);
    for (let i = 0; i < 4; i++) {
      osc.frequency.setValueAtTime(800, ctx.currentTime + i * 0.15);
      osc.frequency.linearRampToValueAtTime(1200, ctx.currentTime + i * 0.15 + 0.075);
      osc.frequency.linearRampToValueAtTime(800, ctx.currentTime + i * 0.15 + 0.15);
    }
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
    osc.connect(gain).connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.6);
  },
  sizzle() {
    if (!soundEnabled) return;
    const ctx = getAudioCtx(), dur = 2, bufSz = ctx.sampleRate * dur;
    const buf = ctx.createBuffer(1, bufSz, ctx.sampleRate), data = buf.getChannelData(0);
    for (let i = 0; i < bufSz; i++) {
      const t = i / ctx.sampleRate;
      data[i] = (Math.random() * 2 - 1) * 0.2 * Math.exp(-t * 2) * (1 + Math.sin(t * 50) * 0.3);
    }
    const src = ctx.createBufferSource(); src.buffer = buf;
    const filt = ctx.createBiquadFilter(); filt.type = 'bandpass'; filt.frequency.value = 2000; filt.Q.value = 0.5;
    const gain = ctx.createGain(); gain.gain.setValueAtTime(0.4, ctx.currentTime);
    src.connect(filt).connect(gain).connect(ctx.destination); src.start(); src.stop(ctx.currentTime + dur);
  }
};

function toggleSound() {
  soundEnabled = !soundEnabled;
  document.getElementById('soundToggle').textContent = soundEnabled ? '🔊' : '🔇';
}

  },

  },
  particles(x, y, count = 20, color = '#fbbf24', spread = 100) {

    for (let i = 0; i < count; i++) {

      const sz = 3 + Math.random() * 6, ang = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
      const dist = 30 + Math.random() * spread, dx = Math.cos(ang) * dist, dy = Math.sin(ang) * dist;
      const dur = 0.4 + Math.random() * 0.6;

        { transform: 'translate(0,0) scale(1)', opacity: 1 },
        { transform: `translate(${dx}px,${dy}px) scale(0.2)`, opacity: 0 }
      ], { duration: dur * 1000, easing: 'ease-out', fill: 'forwards' });
      c.appendChild(p); setTimeout(() => p.remove(), dur * 1000);
    }
  },
  sparks(x, y, count = 15) {

      const s = document.createElement('div'); s.className = 'spark';

      s.style.cssText = `left:${x}px;top:${y}px;`;
      s.animate([{ transform: 'translate(0,0)', opacity: 1 }, { transform: `translate(${dx}px,${dy}px)`, opacity: 0 }],

  },
  smoke(x, y, count = 8, color = 'rgba(148,163,184,0.3)') {

      setTimeout(() => {
        const s = document.createElement('div'); s.className = 'smoke';

          { transform: `translate(${dx}px,-120px) scale(2.5)`, opacity: 0 }
        ], { duration: 2000 + Math.random() * 1000, easing: 'ease-out', fill: 'forwards' });
        c.appendChild(s); setTimeout(() => s.remove(), 3000);

        const px = x - 60 + Math.random() * 120;

        p.animate([
          { transform: 'translate(0,0)', opacity: 1 },
          { transform: `translate(${sway}px,${fall}px)`, opacity: 0.5 }

        c.appendChild(p); setTimeout(() => p.remove(), 4000);
      }, i * 40);
    }
  },
  foam(x, y, color = '#f5f5f4') {
    const c = document.getElementById('beakerArea');
    for (let i = 0; i < 40; i++) {
      setTimeout(() => {
        const f = document.createElement('div'); f.className = 'particle';
        const sz = 6 + Math.random() * 12;
        const dx = (Math.random() - 0.5) * 80, dy = -(20 + Math.random() * 100);
        f.style.cssText = `width:${sz}px;height:${sz}px;background:${color};left:${x}px;top:${y}px;border-radius:50%;opacity:0.7;`;
        f.animate([
          { transform: 'translate(0,0) scale(1)', opacity: 0.7 },

      }, i * 50);
    }
  },

      setTimeout(() => {
        const r = document.createElement('div'); r.className = 'ripple';
        r.style.cssText = `left:${x}px;top:${y}px;transform:translate(-50%,-50%);`;
        r.animate([
          { width: '0px', height: '0px', opacity: 0.5 },

      }, i * 200);
    }
  },

      setTimeout(() => {
        const g = document.createElement('div'); g.className = 'glow-ring';

      }, i * 150);
    }

// ==========================================
// 游戏状态
// ==========================================
let beakerContents = [];
let isHeating = false;
let currentTemp = 25;
let bubbleInterval = null;
let solidElements = {};
let firedReactions = new Set();

function getBeakerCenter() {
  const a = document.getElementById('beakerArea'), b = a.querySelector('.beaker');
  const aR = a.getBoundingClientRect(), bR = b.getBoundingClientRect();
  return { x: bR.left - aR.left + bR.width / 2, y: bR.top - aR.top + bR.height * 0.4 };
}

// ==========================================
// 固体渲染
// ==========================================
function renderSolidChunk(id) {
  const chem = chemicals[id];
  if (chem.state !== 'solid') return;
  const container = document.getElementById('solidChunks');
  const count = 2 + Math.floor(Math.random() * 2);
  const chunks = [];
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div'); el.className = 'solid-chunk dropping';
    el.dataset.chemId = id;
    const sz = 10 + Math.random() * 14;
    const left = 20 + Math.random() * 140;
    const bottom = 5 + Math.random() * 20;
    const r1 = 30 + Math.random() * 40, r2 = 30 + Math.random() * 40;
    const r3 = 30 + Math.random() * 40, r4 = 30 + Math.random() * 40;
    // 特殊光泽效果
    let bg = chem.color;
    let shadow = '';
    if (['Au','Ag','Cu','Fe','Na','K','Li','Mg','Al','Zn','Sn','Pb','Ca'].includes(id)) {
      // 金属光泽
      const lighter = id === 'Au' ? '#fff4a3' : id === 'Cu' ? '#d97706' : id === 'Fe' ? '#71717a' : '#e8e8e8';
      bg = `linear-gradient(135deg, ${chem.color} 30%, ${lighter} 70%, ${chem.color} 100%)`;
      shadow = `0 1px 3px rgba(0,0,0,0.4), inset 0 1px 2px rgba(255,255,255,0.3)`;
    }
    el.style.cssText = `
      width:${sz}px; height:${sz * (0.7 + Math.random() * 0.5)}px;
      left:${left}px; bottom:${bottom}px;
      border-radius: ${r1}% ${r2}% ${r3}% ${r4}%;
      background: ${bg};
      box-shadow: ${shadow || '0 1px 3px rgba(0,0,0,0.3)'};
      animation-delay: ${i * 0.1}s;
    `;
    container.appendChild(el);
    chunks.push(el);
  }
  solidElements[id] = chunks;
}

function dissolveSolid(id) {
  if (!solidElements[id]) return;
  solidElements[id].forEach(el => {
    el.classList.remove('dropping');
    el.classList.add('dissolving');
    setTimeout(() => el.remove(), 1000);
  });
  delete solidElements[id];
}

// ==========================================
// 播放特效
// ==========================================
function playReactionVFX(rx) {
  const center = getBeakerCenter();
  const vfx = rx.vfx || 'gentle';

  // 溶解相关固体
  if (rx.reactants) {
    rx.reactants.forEach(r => {
      if (chemicals[r] && chemicals[r].state === 'solid' && !['MnO2'].includes(r)) {
        setTimeout(() => dissolveSolid(r), 500);
      }
    });
  }

  switch (vfx) {
    case 'fizz':
      SFX.hiss(1.5); SFX.bubbling(2);
      VFX.shake(); VFX.borderGlow('#10b981');
      VFX.ripple(center.x, center.y + 60);
      break;
    case 'violent':
      SFX.hiss(2); SFX.bubbling(3); SFX.explosion();
      VFX.shake('hard'); VFX.flash('rgba(245,158,11,0.3)');
      VFX.sparks(center.x, center.y, 20);
      VFX.smoke(center.x, center.y - 40, 10);
      VFX.borderGlow('#f59e0b');
      break;
    case 'explosion':
      SFX.explosion(); SFX.alarm();
      setTimeout(() => SFX.hiss(2), 300);
      VFX.shake('hard'); VFX.flash('rgba(239,68,68,0.5)');
      VFX.particles(center.x, center.y, 40, '#ef4444', 150);
      VFX.sparks(center.x, center.y, 30);
      VFX.smoke(center.x, center.y - 40, 15, 'rgba(239,68,68,0.2)');
      VFX.borderGlow('#ef4444');
      setTimeout(() => {
        VFX.flash('rgba(251,191,36,0.4)');
        VFX.particles(center.x + 20, center.y - 20, 25, '#fbbf24', 120);
      }, 400);
      break;
    case 'megaExplosion':
      SFX.bigExplosion(); SFX.alarm();
      setTimeout(() => { SFX.explosion(); SFX.sizzle(); }, 200);
      VFX.shake('extreme');
      VFX.flash('rgba(239,68,68,0.7)');
      VFX.particles(center.x, center.y, 60, '#ef4444', 200);
      VFX.sparks(center.x, center.y, 40);
      VFX.smoke(center.x, center.y - 40, 20, 'rgba(239,68,68,0.3)');
      VFX.borderGlow('#ef4444');
      setTimeout(() => {
        VFX.flash('rgba(168,85,247,0.5)');
        VFX.particles(center.x, center.y, 40, '#a855f7', 150);
        VFX.sparks(center.x, center.y, 25);

      setTimeout(() => {
        VFX.flash('rgba(251,191,36,0.5)');
        VFX.particles(center.x - 20, center.y + 10, 30, '#fbbf24', 130);
      }, 600);
      break;
    case 'precipitate':
      SFX.chime(); SFX.pour();
      VFX.precipitate(rx.precipitateColor || '#67e8f9', 35);
      VFX.glowPulse(center.x, center.y, rx.precipitateColor || '#67e8f9');
      VFX.borderGlow(rx.precipitateColor || '#67e8f9');

      VFX.shake('hard');
      VFX.foam(center.x, center.y - 20, '#f5f5f4');
      VFX.flash('rgba(124,58,237,0.3)');
      VFX.borderGlow('#7c3aed');
      VFX.boil();
      break;
    case 'gentle':
    default:
      SFX.pour();
      VFX.glowPulse(center.x, center.y, '#6366f1');
      VFX.borderGlow('#6366f1');
      break;
  }
}

// ==========================================
// UI 初始化
// ==========================================
function initShelf() {
  const containers = { metals: document.getElementById('metals'), acids: document.getElementById('acids'), bases: document.getElementById('bases'), salts: document.getElementById('salts'), others: document.getElementById('others') };
  for (const [id, chem] of Object.entries(chemicals)) {
    const btn = document.createElement('button'); btn.className = 'chem-btn';
    const dotColor = chem.state === 'liquid' ? 'rgba(100,200,255,0.6)' : chem.state === 'gas' ? 'rgba(200,200,200,0.3)' : chem.color;
    btn.innerHTML = `<span class="color-dot" style="background:${dotColor}"></span><span class="formula">${chem.formula}</span><span class="name">${chem.name}</span>`;
    btn.onclick = () => addChemical(id);
    containers[chem.category].appendChild(btn);
  }
}

function addChemical(id) {
  if (beakerContents.length >= 5) { alert('烧杯最多同时放入5种物质！请先清空。'); return; }
  if (beakerContents.includes(id)) return;

  const chem = chemicals[id];
  if (chem.state === 'solid') { SFX.metalClink(); renderSolidChunk(id); }
  else SFX.drop();

  beakerContents.push(id);
  updateBeakerVisual();
  updateAddedItems();
  checkReactions();
}

function updateBeakerVisual() {
  const liquid = document.getElementById('beakerLiquid');
  if (beakerContents.length === 0) { liquid.style.height = '0'; liquid.style.background = 'transparent'; return; }
  const liquidItems = beakerContents.filter(id => chemicals[id].state === 'liquid');
  const solidItems = beakerContents.filter(id => chemicals[id].state !== 'liquid' && chemicals[id].state !== 'gas');
  const height = Math.min(70, 15 + liquidItems.length * 18 + solidItems.length * 6);
  liquid.style.height = height + '%';
  const lastLiquid = [...beakerContents].reverse().find(id => chemicals[id].state === 'liquid');
  if (lastLiquid) {
    liquid.style.background = chemicals[lastLiquid].color;
  } else {
    liquid.style.background = 'rgba(148,163,184,0.15)';
  }
}

function updateAddedItems() {
  document.getElementById('addedItems').innerHTML = beakerContents.map(id => {
    const c = chemicals[id];
    return `<div class="added-tag">${c.formula} ${c.name}</div>`;
  }).join('');
}

function checkReactions() {
  const resultsDiv = document.getElementById('results');
  let foundNew = false;
  for (const rx of reactions) {
    const key = rx.reactants.slice().sort().join('+');
    if (firedReactions.has(key)) continue;
    if (!rx.reactants.every(r => beakerContents.includes(r))) continue;
    firedReactions.add(key);
    foundNew = true;

    // 更新液体颜色
    if (rx.color) {
      const liquid = document.getElementById('beakerLiquid');
      liquid.style.background = rx.color;
      liquid.style.height = Math.min(75, (parseInt(liquid.style.height) || 20) + 10) + '%';
    }
    if (rx.temperature) { currentTemp = Math.max(currentTemp, rx.temperature); updateThermometer(); }
    if (rx.bubbles) startBubbles();
    if (rx.gasEmoji) showGasEffect(rx.gasEmoji);

    playReactionVFX(rx);

    if (resultsDiv.querySelector('.result-empty')) resultsDiv.innerHTML = '';
    const card = document.createElement('div');
    card.className = `reaction-card ${rx.type || ''}`;
    card.innerHTML = `<div class="reaction-equation">${rx.equation}</div><div class="reaction-desc">${rx.description}</div><div class="reaction-phenomenon"><span>🔍 现象：</span>${rx.phenomenon}</div>`;
    resultsDiv.insertBefore(card, resultsDiv.firstChild);
  }

  if (!foundNew && beakerContents.length >= 2) {
    const hasAnyReaction = firedReactions.size > 0;
    if (!hasAnyReaction && !resultsDiv.querySelector('.no-reaction')) {
      const note = document.createElement('div');
      note.className = 'reaction-card no-reaction';
      note.style.background = 'rgba(100,116,139,0.1)'; note.style.borderColor = 'rgba(100,116,139,0.3)';
      note.innerHTML = `<div class="reaction-desc">🤔 当前物质之间未发生明显反应。换个组合试试？</div>`;
      resultsDiv.insertBefore(note, resultsDiv.firstChild);
    }
  }
}

function startBubbles() {
  if (bubbleInterval) clearInterval(bubbleInterval);
  const liquid = document.getElementById('beakerLiquid');
  bubbleInterval = setInterval(() => {
    const b = document.createElement('div'); b.className = 'bubble';
    const s = 4 + Math.random() * 8;
    b.style.cssText = `width:${s}px;height:${s}px;left:${10+Math.random()*80}%;bottom:10px;`;
    liquid.appendChild(b); setTimeout(() => b.remove(), 1500);
  }, 200);
  setTimeout(() => {
    if (bubbleInterval) { clearInterval(bubbleInterval);
      bubbleInterval = setInterval(() => {
        const b = document.createElement('div'); b.className = 'bubble';
        const s = 3 + Math.random() * 5;
        b.style.cssText = `width:${s}px;height:${s}px;left:${10+Math.random()*80}%;bottom:10px;`;
        liquid.appendChild(b); setTimeout(() => b.remove(), 1500);
      }, 600);
    }
  }, 5000);
}

function stopBubbles() { if (bubbleInterval) { clearInterval(bubbleInterval); bubbleInterval = null; } }

function showGasEffect(emoji) {
  const c = document.getElementById('beakerArea');
  for (let i = 0; i < 5; i++) {
    setTimeout(() => {
      const g = document.createElement('div'); g.className = 'gas-effect';
      g.textContent = emoji; g.style.left = (40 + Math.random() * 20) + '%';
      c.appendChild(g); setTimeout(() => g.remove(), 2000);
    }, i * 400);
  }
}

function updateThermometer() {
  const pct = Math.min(95, Math.max(10, (currentTemp / 100) * 80 + 10));
  document.getElementById('thermoFill').style.height = pct + '%';
  document.getElementById('thermoLabel').textContent = currentTemp + '°C';
}

function toggleHeat() {
  isHeating = !isHeating;
  document.getElementById('flame').style.display = isHeating ? 'block' : 'none';
  if (isHeating) {
    currentTemp = Math.min(100, currentTemp + 30);
    SFX.hiss(0.5);
    if (currentTemp >= 80) VFX.boil();
  } else {
    currentTemp = Math.max(25, currentTemp - 20);
  }
  updateThermometer();
}

function clearBeaker() {
  beakerContents = []; isHeating = false; currentTemp = 25; stopBubbles();
  firedReactions.clear(); solidElements = {};
  SFX.pour();
  document.getElementById('flame').style.display = 'none';
  const liquid = document.getElementById('beakerLiquid');
  liquid.style.height = '0'; liquid.style.background = 'transparent';
  document.getElementById('addedItems').innerHTML = '';
  document.getElementById('solidChunks').innerHTML = '';
  document.getElementById('results').innerHTML = '<div class="result-empty">选择化学物质加入烧杯，开始你的实验吧！</div>';
  document.getElementById('beakerArea').style.borderColor = '';
  document.getElementById('beakerArea').style.boxShadow = '';
  updateThermometer();
  document.querySelectorAll('.bubble,.gas-effect,.particle,.spark,.smoke,.precipitate-particle,.ripple,.glow-ring,.steam').forEach(el => el.remove());
}

initShelf();
updateThermometer();
</script>
</body>
