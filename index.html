<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧪 化学实验室</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #e2e8f0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .header {
      text-align: center;
      padding: 24px;
      background: rgba(15, 23, 42, 0.8);
      border-bottom: 1px solid rgba(99, 102, 241, 0.3);
    }
    .header h1 { font-size: 28px; }
    .header h1 span { font-size: 32px; }
    .header p { color: #94a3b8; margin-top: 4px; font-size: 14px; }

    .main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 24px;
    }

    /* === 左侧：化学物质架 === */
    .shelf {
      background: rgba(30, 41, 59, 0.8);
      border-radius: 16px;
      padding: 20px;
      border: 1px solid rgba(99, 102, 241, 0.2);
    }
    .shelf h2 {
      font-size: 16px;
      color: #a5b4fc;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .shelf-category {
      margin-bottom: 16px;
    }
    .shelf-category h3 {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .chem-btn {
      display: inline-block;
      padding: 8px 14px;
      margin: 3px;
      border-radius: 10px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      background: rgba(51, 65, 85, 0.6);
      color: #e2e8f0;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.2s;
    }
    .chem-btn:hover {
      background: rgba(99, 102, 241, 0.3);
      border-color: #6366f1;
      transform: translateY(-1px);
    }
    .chem-btn:active { transform: scale(0.96); }
    .chem-btn .formula { font-weight: 700; }
    .chem-btn .name { font-size: 11px; color: #94a3b8; display: block; margin-top: 2px; }

    /* === 右侧：实验台 === */
    .lab-bench {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* 烧杯区域 */
    .beaker-area {
      background: rgba(30, 41, 59, 0.8);
      border-radius: 16px;
      padding: 24px;
      border: 1px solid rgba(99, 102, 241, 0.2);
      display: flex;
      justify-content: center;
      align-items: flex-end;
      min-height: 320px;
      position: relative;
    }

    .beaker {
      width: 200px;
      height: 250px;
      position: relative;
    }
    .beaker-glass {
      position: absolute;
      bottom: 0;
      width: 200px;
      height: 230px;
      border: 3px solid rgba(148, 163, 184, 0.4);
      border-top: none;
      border-radius: 0 0 20px 20px;
      background: rgba(148, 163, 184, 0.05);
    }
    .beaker-rim {
      position: absolute;
      top: 17px;
      left: -8px;
      width: 216px;
      height: 6px;
      background: rgba(148, 163, 184, 0.3);
      border-radius: 3px;
    }
    .beaker-liquid {
      position: absolute;
      bottom: 3px;
      left: 3px;
      right: 3px;
      height: 0;
      border-radius: 0 0 17px 17px;
      transition: all 0.8s ease;
      overflow: hidden;
    }
    .beaker-label {
      position: absolute;
      bottom: -30px;
      width: 100%;
      text-align: center;
      font-size: 13px;
      color: #64748b;
    }

    /* 气泡动画 */
    .bubble {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      animation: rise 1.5s ease-in infinite;
    }
    @keyframes rise {
      0% { transform: translateY(0) scale(1); opacity: 0.6; }
      100% { transform: translateY(-180px) scale(0.3); opacity: 0; }
    }

    /* 烟雾/气体动画 */
    .gas-effect {
      position: absolute;
      top: -40px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 24px;
      animation: floatUp 2s ease-out infinite;
      opacity: 0;
    }
    @keyframes floatUp {
      0% { opacity: 0.8; transform: translateX(-50%) translateY(0); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-60px); }
    }

    /* 已添加物质标签 */
    .added-items {
      position: absolute;
      top: 16px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: flex-end;
    }
    .added-tag {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      background: rgba(99, 102, 241, 0.2);
      border: 1px solid rgba(99, 102, 241, 0.3);
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(10px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* 反应结果面板 */
    .result-panel {
      background: rgba(30, 41, 59, 0.8);
      border-radius: 16px;
      padding: 20px;
      border: 1px solid rgba(99, 102, 241, 0.2);
      min-height: 120px;
    }
    .result-panel h2 {
      font-size: 16px;
      color: #a5b4fc;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .result-empty {
      color: #475569;
      font-size: 14px;
      text-align: center;
      padding: 20px;
    }
    .reaction-card {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 10px;
      animation: slideIn 0.5s ease;
    }
    .reaction-card.warning {
      background: rgba(245, 158, 11, 0.1);
      border-color: rgba(245, 158, 11, 0.3);
    }
    .reaction-card.danger {
      background: rgba(239, 68, 68, 0.1);
      border-color: rgba(239, 68, 68, 0.3);
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .reaction-equation {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
      font-family: 'Courier New', monospace;
    }
    .reaction-desc {
      font-size: 14px;
      color: #94a3b8;
      line-height: 1.6;
    }
    .reaction-phenomenon {
      margin-top: 8px;
      padding: 8px 12px;
      background: rgba(0,0,0,0.2);
      border-radius: 8px;
      font-size: 13px;
    }
    .reaction-phenomenon span {
      color: #fbbf24;
    }

    /* 底部按钮 */
    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    .ctrl-btn {
      padding: 10px 24px;
      border-radius: 10px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      background: rgba(51, 65, 85, 0.6);
      color: #e2e8f0;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.2s;
    }
    .ctrl-btn:hover {
      background: rgba(239, 68, 68, 0.3);
      border-color: #ef4444;
    }
    .ctrl-btn.primary {
      background: rgba(99, 102, 241, 0.3);
      border-color: #6366f1;
    }
    .ctrl-btn.primary:hover {
      background: rgba(99, 102, 241, 0.5);
    }

    /* 温度计 */
    .thermometer {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 30px;
      height: 150px;
      background: rgba(0,0,0,0.3);
      border-radius: 15px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
    .thermo-fill {
      width: 100%;
      height: 30%;
      background: linear-gradient(to top, #ef4444, #f97316);
      border-radius: 0 0 15px 15px;
      transition: height 0.8s ease;
    }
    .thermo-label {
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: #64748b;
      white-space: nowrap;
    }

    /* 火焰效果 */
    .flame {
      position: absolute;
      bottom: -15px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 28px;
      animation: flicker 0.3s ease-in-out infinite alternate;
      display: none;
    }
    @keyframes flicker {
      from { transform: translateX(-50%) scale(1); }
      to { transform: translateX(-50%) scale(1.1); }
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .main {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1><span>🧪</span> 化学实验室</h1>
    <p>选择化学物质添加到烧杯中，观察真实的化学反应</p>
  </div>

  <div class="main">
    <!-- 左侧：化学物质架 -->
    <div class="shelf">
      <h2>🧫 化学物质架</h2>

      <div class="shelf-category">
        <h3>金属</h3>
        <div id="metals"></div>
      </div>

      <div class="shelf-category">
        <h3>酸</h3>
        <div id="acids"></div>
      </div>

      <div class="shelf-category">
        <h3>碱</h3>
        <div id="bases"></div>
      </div>

      <div class="shelf-category">
        <h3>盐 & 氧化物</h3>
        <div id="salts"></div>
      </div>

      <div class="shelf-category">
        <h3>非金属 & 其他</h3>
        <div id="others"></div>
      </div>
    </div>

    <!-- 右侧：实验台 -->
    <div class="lab-bench">
      <div class="beaker-area" id="beakerArea">
        <div class="thermometer">
          <div class="thermo-fill" id="thermoFill"></div>
          <div class="thermo-label" id="thermoLabel">25°C</div>
        </div>

        <div class="added-items" id="addedItems"></div>

        <div class="beaker">
          <div class="beaker-rim"></div>
          <div class="beaker-glass">
            <div class="beaker-liquid" id="beakerLiquid"></div>
          </div>
          <div class="flame" id="flame">🔥</div>
          <div class="beaker-label">250 mL 烧杯</div>
        </div>

        <div class="gas-effect" id="gasEffect"></div>
      </div>

      <div class="controls">
        <button class="ctrl-btn" onclick="clearBeaker()">🗑️ 清空烧杯</button>
        <button class="ctrl-btn primary" onclick="toggleHeat()">🔥 加热</button>
      </div>

      <div class="result-panel">
        <h2>📋 实验记录</h2>
        <div id="results">
          <div class="result-empty">添加化学物质到烧杯中开始实验...</div>
        </div>
      </div>
    </div>
  </div>

<script>

  CuO:    { name: '氧化铜',   formula: 'CuO',     category: 'salts', color: '#1c1917', state: 'solid' },
  Fe2O3:  { name: '氧化铁',   formula: 'Fe₂O₃',   category: 'salts', color: '#b91c1c', state: 'solid' },
  FeCl3:  { name: '氯化铁',   formula: 'FeCl₃',   category: 'salts', color: '#92400e', state: 'solid' },

  CO2:    { name: '二氧化碳', formula: 'CO₂',      category: 'others', color: 'transparent', state: 'gas' },

};

// 修正 CaCO3 的名字

// ==========================================
// 游戏状态
// ==========================================
let beakerContents = [];
let isHeating = false;
let currentTemp = 25;
let bubbleInterval = null;

// ==========================================
// 初始化界面
// ==========================================
function initShelf() {
  const containers = {
    metals: document.getElementById('metals'),
    acids: document.getElementById('acids'),
    bases: document.getElementById('bases'),
    salts: document.getElementById('salts'),
    others: document.getElementById('others'),
  };

  for (const [id, chem] of Object.entries(chemicals)) {
    const btn = document.createElement('button');
    btn.className = 'chem-btn';
    btn.innerHTML = `<span class="formula">${chem.formula}</span><span class="name">${chem.name}</span>`;
    btn.onclick = () => addChemical(id);
    containers[chem.category].appendChild(btn);
  }
}

// ==========================================
// 添加化学物质
// ==========================================
function addChemical(id) {
  if (beakerContents.length >= 4) {
    alert('烧杯最多同时放入4种物质！请先清空。');
    return;
  }
  if (beakerContents.includes(id)) {
    return; // 不重复添加
  }

  beakerContents.push(id);
  updateBeakerVisual();
  updateAddedItems();
  checkReactions();
}

// ==========================================
// 更新烧杯外观
// ==========================================
function updateBeakerVisual() {
  const liquid = document.getElementById('beakerLiquid');
  if (beakerContents.length === 0) {
    liquid.style.height = '0';
    liquid.style.background = 'transparent';
    return;
  }

  // 计算液面高度
  const liquidItems = beakerContents.filter(id => chemicals[id].state === 'liquid');
  const solidItems = beakerContents.filter(id => chemicals[id].state !== 'liquid');
  const height = Math.min(70, 20 + liquidItems.length * 20 + solidItems.length * 8);
  liquid.style.height = height + '%';

  // 混合颜色（取最后添加的液体颜色）
  const lastLiquid = [...beakerContents].reverse().find(id => chemicals[id].state === 'liquid');
  const color = lastLiquid ? chemicals[lastLiquid].color : 'rgba(148,163,184,0.2)';
  liquid.style.background = color;
}

// ==========================================
// 更新已添加标签
// ==========================================
function updateAddedItems() {
  const container = document.getElementById('addedItems');
  container.innerHTML = beakerContents.map(id => {
    const c = chemicals[id];
    return `<div class="added-tag">${c.formula} ${c.name}</div>`;
  }).join('');
}

// ==========================================
// 检查反应
// ==========================================
function checkReactions() {
  const resultsDiv = document.getElementById('results');
  let foundReaction = false;

  for (const rx of reactions) {
    // 检查反应物是否都在烧杯里
    const allPresent = rx.reactants.every(r => beakerContents.includes(r));
    if (!allPresent) continue;

    foundReaction = true;

    // 更新液体颜色
    if (rx.color) {
      const liquid = document.getElementById('beakerLiquid');
      liquid.style.background = rx.color;
      // 增加液面
      const currentH = parseInt(liquid.style.height) || 20;
      liquid.style.height = Math.min(75, currentH + 10) + '%';
    }

    // 温度变化
    if (rx.temperature) {
      currentTemp = rx.temperature;
      updateThermometer();
    }

    // 气泡效果
    if (rx.bubbles) {
      startBubbles();
    }

    // 气体效果
    if (rx.gasEmoji) {
      showGasEffect(rx.gasEmoji);
    }

    // 显示结果
    if (resultsDiv.querySelector('.result-empty')) {
      resultsDiv.innerHTML = '';
    }

    const card = document.createElement('div');
    card.className = `reaction-card ${rx.type || ''}`;
    card.innerHTML = `
      <div class="reaction-equation">${rx.equation}</div>
      <div class="reaction-desc">${rx.description}</div>
      <div class="reaction-phenomenon">
        <span>🔍 现象：</span>${rx.phenomenon}
      </div>
    `;
    resultsDiv.insertBefore(card, resultsDiv.firstChild);
  }

  if (!foundReaction && beakerContents.length >= 2) {
    // 没有已知反应
    if (!resultsDiv.querySelector('.no-reaction')) {
      const note = document.createElement('div');
      note.className = 'reaction-card no-reaction';
      note.style.background = 'rgba(100,116,139,0.1)';
      note.style.borderColor = 'rgba(100,116,139,0.3)';
      note.innerHTML = `<div class="reaction-desc">🤔 当前物质之间未发生明显反应。尝试换一种组合？</div>`;
      resultsDiv.insertBefore(note, resultsDiv.firstChild);
    }
  }
}

// ==========================================
// 气泡效果
// ==========================================
function startBubbles() {
  if (bubbleInterval) clearInterval(bubbleInterval);
  
  const liquid = document.getElementById('beakerLiquid');
  bubbleInterval = setInterval(() => {
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    const size = 4 + Math.random() * 8;
    bubble.style.width = size + 'px';
    bubble.style.height = size + 'px';
    bubble.style.left = (10 + Math.random() * 80) + '%';
    bubble.style.bottom = '10px';
    liquid.appendChild(bubble);
    setTimeout(() => bubble.remove(), 1500);
  }, 200);

  // 5秒后减缓
  setTimeout(() => {
    if (bubbleInterval) {
      clearInterval(bubbleInterval);
      bubbleInterval = setInterval(() => {
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        const size = 3 + Math.random() * 5;
        bubble.style.width = size + 'px';
        bubble.style.height = size + 'px';
        bubble.style.left = (10 + Math.random() * 80) + '%';
        bubble.style.bottom = '10px';
        liquid.appendChild(bubble);
        setTimeout(() => bubble.remove(), 1500);
      }, 600);
    }
  }, 5000);
}

function stopBubbles() {
  if (bubbleInterval) {
    clearInterval(bubbleInterval);
    bubbleInterval = null;
  }
}

// ==========================================
// 气体效果
// ==========================================
function showGasEffect(emoji) {
  const container = document.getElementById('beakerArea');
  for (let i = 0; i < 5; i++) {
    setTimeout(() => {
      const gas = document.createElement('div');
      gas.className = 'gas-effect';
      gas.textContent = emoji;
      gas.style.left = (40 + Math.random() * 20) + '%';
      gas.style.animationDelay = (Math.random() * 0.5) + 's';
      container.appendChild(gas);
      setTimeout(() => gas.remove(), 2000);
    }, i * 400);
  }
}

// ==========================================
// 温度计
// ==========================================
function updateThermometer() {
  const fill = document.getElementById('thermoFill');
  const label = document.getElementById('thermoLabel');
  const pct = Math.min(95, Math.max(10, (currentTemp / 100) * 80 + 10));
  fill.style.height = pct + '%';
  label.textContent = currentTemp + '°C';
}

// ==========================================
// 加热
// ==========================================
function toggleHeat() {
  isHeating = !isHeating;
  const flame = document.getElementById('flame');
  flame.style.display = isHeating ? 'block' : 'none';
  
  if (isHeating) {
    currentTemp = Math.min(100, currentTemp + 30);
    updateThermometer();
  } else {
    currentTemp = Math.max(25, currentTemp - 20);
    updateThermometer();
  }
}

// ==========================================
// 清空
// ==========================================
function clearBeaker() {
  beakerContents = [];
  isHeating = false;
  currentTemp = 25;
  stopBubbles();
  
  document.getElementById('flame').style.display = 'none';
  document.getElementById('beakerLiquid').style.height = '0';
  document.getElementById('beakerLiquid').style.background = 'transparent';
  document.getElementById('addedItems').innerHTML = '';
  document.getElementById('results').innerHTML = '<div class="result-empty">添加化学物质到烧杯中开始实验...</div>';
  updateThermometer();
  
  // 清除残留气泡
  document.querySelectorAll('.bubble, .gas-effect').forEach(el => el.remove());
}

// 启动
initShelf();
updateThermometer();
</script>
